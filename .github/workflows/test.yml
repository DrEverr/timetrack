name: Tests

on:
  push:
    branches:
      - main
  pull_request:

env:
  BUN_VERSION: 1.3.3

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Run build
        run: bun run build
